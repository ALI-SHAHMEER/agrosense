name: agrosense
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # Web framework
      - fastapi==0.111.0
      - uvicorn[standard]==0.29.0
      - python-multipart==0.0.9

      # Database
      - sqlalchemy==2.0.30
      - alembic==1.13.1
      - psycopg2-binary==2.9.9
      - geoalchemy2==0.15.1

      # Auth & Security
      - python-jose[cryptography]==3.3.0
      - passlib[bcrypt]==1.7.4

      # Config
      - pydantic==2.7.1
      - pydantic-settings==2.2.1
      - python-dotenv==1.0.1

      # ML (install now, use later)
      - numpy==1.26.4
      - pandas==2.2.2
      - scikit-learn==1.4.2
      - xgboost==2.0.3

      # Remote Sensing
      - earthengine-api==0.1.403
      - rasterio==1.3.10

      # Utils
      - httpx==0.27.0
      - python-dateutil==2.9.0
