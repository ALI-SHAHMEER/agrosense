name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: agrosense_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: agrosense_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://agrosense_user:ci_password@localhost:5432/agrosense_db
      SECRET_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_ENV: testing
      GEE_SERVICE_ACCOUNT: ${{ secrets.GEE_SERVICE_ACCOUNT }}
      GEE_KEY_FILE: secrets/gee-key.json
      GMAIL_USER: ""
      GMAIL_APP_PASSWORD: ""
      ADMIN_EMAIL: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "fastapi==0.111.0" \
            "uvicorn[standard]==0.29.0" \
            "python-multipart==0.0.9" \
            "sqlalchemy==2.0.30" \
            "alembic==1.13.1" \
            "psycopg2-binary==2.9.9" \
            "geoalchemy2==0.15.1" \
            "python-jose[cryptography]==3.3.0" \
            "passlib[bcrypt]==1.7.4" \
            "pydantic==2.7.1" \
            "pydantic-settings==2.2.1" \
            "python-dotenv==1.0.1" \
            "numpy==1.26.4" \
            "pandas==2.2.2" \
            "scikit-learn==1.4.2" \
            "xgboost==2.0.3" \
            "earthengine-api==0.1.403" \
            "rasterio==1.3.10" \
            "httpx==0.27.0" \
            "python-dateutil==2.9.0" \
            "requests" \
            "pytest"

      - name: Write GEE credentials
        env:
          GEE_KEY_JSON: ${{ secrets.GEE_KEY_JSON }}
        run: |
          mkdir -p secrets
          if [ -n "$GEE_KEY_JSON" ]; then
            echo "$GEE_KEY_JSON" > secrets/gee-key.json
          fi

      - name: Run database migrations
        run: alembic upgrade head

      - name: Start API server
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "" && break
            sleep 1
          done

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Stop API server
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
